name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ]
    # Ignore non-critical files
    paths-ignore:
      - '**.md'                    # README, RUNNING, CLAUDE, AGENTS, etc
      - '.gitignore'
      - 'frontend-web/**'          # Frontend assets (separate deployment)
      - 'scratch/**'               # Scratch/temp files
      - 'tests/**'                 # Test files (not needed in production)
      - '.github/workflows/**'      # Workflow files
      - 'docker/**'                # Docker config (optional)
      - 'config/**'                # Config files (static, rarely change)
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Nhatminh1234:$HF_TOKEN@huggingface.co/spaces/Nhatminh1234/IoT-DigitalTwin-Backend main
